# email-schedules.yaml — 定时任务配置
#
# 每个任务在指定时间触发一个 Profile 执行，并将结果以邮件形式发出。
# 复制本文件为 email-schedules.yaml 并按需修改。

tasks:
  - name: daily-morning-brief
    cron: "0 9 * * 1-5"          # 工作日早上 9 点
    timezone: "Asia/Shanghai"     # 可选，默认系统时区
    profile: claude               # 使用哪个 Profile（需在 email-profiles.yaml 中定义）
    message: |
      请生成今天的工作简报，包括：
      1. 今日重点事项提醒
      2. 本周进度总结
      3. 需要关注的风险点
    to: kongjie920@gmail.com      # 发送给谁
    subject: "📋 每日工作简报"
    enabled: true

  - name: weekly-review
    cron: "0 18 * * 5"           # 每周五下午 6 点
    timezone: "Asia/Shanghai"
    profile: claude
    message: "请生成本周工作总结，回顾目标完成情况，并列出下周计划。"
    to: kongjie920@gmail.com
    subject: "📊 每周复盘"
    enabled: false                # disabled — 改为 true 启用

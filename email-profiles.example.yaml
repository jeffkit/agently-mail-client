# email-profiles.yaml 示例配置
#
# 使用邮件主题前缀 [profile-name] 指定处理 Profile：
#   Subject: [cursor] 帮我看这段代码
#
# 内置 Profile 路径相对于本配置文件所在目录（无需 npm install）

# ── 发件人访问控制（可选） ──────────────────────────────────────────────────────
#
# allowed_senders: 全局白名单，只处理来自这些地址/域名的邮件
#   不配置或留空 = 不限制（接受所有来信）
#   支持：精确地址 "user@example.com"
#         域名    "@example.com"（该域所有邮箱）
#         子域通配 "@*.example.com"（所有子域名）
#
# allowed_senders:
#   - me@gmail.com
#   - "@mycompany.com"
#   - "@*.trusted-partner.org"

# denied_senders: 全局黑名单，优先级高于白名单
#
# denied_senders:
#   - spam@example.com
#   - "@blocked-domain.com"

# deny_action: 被拒绝时的行为
#   silent  — 静默丢弃，不回复（默认，避免泄露 Agent 存在）
#   notify  — 发送一封礼貌的拒绝通知邮件
#
# deny_action: silent

# ── 系统 Prompt（可选） ───────────────────────────────────────────────────────
#
# system_prompt: 注入到所有 Profile 的 AGENT_MESSAGE 最前面（全局默认值）
#   不配置时使用内置默认值（中文邮件助手角色）
#   每个 Profile 也可以单独设置 system_prompt，优先级高于全局配置
#
# system_prompt: "You are a helpful email assistant. Reply directly and concisely."

# ───────────────────────────────────────────────────────────────────────────────

# deny_message: 自定义拒绝通知邮件正文（仅 deny_action: notify 时生效）
#
# deny_message: "感谢来信，您无权使用此服务，请联系管理员。"

# ───────────────────────────────────────────────────────────────────────────────

default: claude-code

profiles:
  # ──────────────────────────────────────
  # 内置 Coding Agent CLI Profiles
  # ──────────────────────────────────────

  # ────────────────────────────────────────────────────────────────────────────
  # 同一个 AI CLI 可以定义多个 Profile，每个绑定不同 workdir / trigger / prompt
  #
  # 示例：两个 Claude，分别对应不同项目（主题写 [proj-a] 或 [proj-b]）
  #
  # proj-a:
  #   command: node
  #   args: [./profiles/claude-code.js]
  #   trigger: proj-a
  #   workdir: /Users/me/projects/project-a   # Claude 在此目录运行
  #   system_prompt: "You are a Claude assistant for Project A."
  #   timeout_ms: 600000
  #
  # proj-b:
  #   command: node
  #   args: [./profiles/claude-code.js]
  #   trigger: proj-b
  #   workdir: ../project-b                   # 相对于本 yaml 目录
  # ────────────────────────────────────────────────────────────────────────────

  claude-code:
    command: node
    args:
      - ./profiles/claude-code.js   # Claude Code CLI (claude)
    description: Claude Code AI 助手（默认）
    trigger: claude
    # workdir: /Users/me/projects/my-project  # 可选：指定工作目录
    # timeout_ms: 600000                       # 可选：超时毫秒数（默认 300000）
    # system_prompt: "You are a coding assistant."  # 可选：覆盖默认提示词

  cursor:
    command: node
    args:
      - ./profiles/cursor.js        # Cursor Agent CLI (agent)
    description: Cursor AI 编程助手
    trigger: cursor
    # 可选 env: CURSOR_MODEL=claude-opus-4-5

  codebuddy:
    command: node
    args:
      - ./profiles/codebuddy.js     # CodeBuddy Code CLI (codebuddy)
    description: CodeBuddy Code AI（腾讯云内部）
    trigger: codebuddy
    # 可选 env: ILINK_CODEBUDDY_MODEL=claude-sonnet-4.6

  codex:
    command: node
    args:
      - ./profiles/codex.js         # OpenAI Codex CLI (codex)
    description: OpenAI Codex
    trigger: codex

  agy:
    command: node
    args:
      - ./profiles/agy.js           # Antigravity (Google DeepMind) CLI (agy)
    description: Google DeepMind Agy
    trigger: agy
    # 可选 env: AGY_MODEL=gemini-2.0-flash

  # ──────────────────────────────────────
  # 调试 / 自定义 Profile
  # ──────────────────────────────────────

  echo:
    command: node
    args:
      - ./profiles/echo.js          # 原样回显，调试路由用
    description: Echo（调试）
    trigger: echo
    # per-profile 白名单示例：只有自己能用 echo（调试专用）
    # allowed_senders:
    #   - me@gmail.com
    # per-profile system_prompt 示例（覆盖全局）：
    # system_prompt: "You are an echo bot. Return the message as-is."
    # per-profile timeout（毫秒，默认 300000 = 5 分钟）：
    # timeout_ms: 600000
